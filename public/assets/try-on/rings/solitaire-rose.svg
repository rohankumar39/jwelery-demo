<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8B4A0"/>
      <stop offset="50%" stop-color="#D4906C"/>
      <stop offset="100%" stop-color="#C07850"/>
    </linearGradient>
    <radialGradient id="dg" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#9ABCD0"/>
    </radialGradient>
  </defs>
  <!-- Ring band -->
  <path d="M15 75 Q15 90, 50 92 Q85 90, 85 75 L85 70 Q85 60, 70 58 L70 55 Q70 40, 50 38 Q30 40, 30 55 L30 58 Q15 60, 15 70Z" fill="url(#rg)" opacity="0.9"/>
  <!-- Band highlight -->
  <path d="M20 72 Q20 82, 50 84 Q80 82, 80 72" fill="none" stroke="#E8B4A0" stroke-width="1.5" opacity="0.5"/>
  <!-- Prong setting -->
  <circle cx="50" cy="45" r="16" fill="url(#rg)" opacity="0.85"/>
  <!-- Diamond -->
  <circle cx="50" cy="45" r="10" fill="url(#dg)" opacity="0.95"/>
  <!-- Diamond facets -->
  <polygon points="50,35 58,42 50,45 42,42" fill="white" opacity="0.4"/>
  <polygon points="50,55 58,48 50,45 42,48" fill="#9ABCD0" opacity="0.3"/>
  <!-- Sparkle -->
  <circle cx="44" cy="39" r="2" fill="white" opacity="0.9"/>
  <circle cx="53" cy="37" r="1.2" fill="white" opacity="0.7"/>
</svg>