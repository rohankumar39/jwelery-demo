<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 70" width="300" height="70">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C560"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#B8932A"/>
    </linearGradient>
  </defs>
  <!-- Main bangle body -->
  <rect x="5" y="15" width="290" height="40" rx="20" fill="url(#bg)" opacity="0.92"/>
  <!-- Inner enamel band -->
  <rect x="10" y="22" width="280" height="26" rx="13" fill="#8B1A1A" opacity="0.7"/>
  <!-- Kundan stone clusters along band -->
  <g>
    <circle cx="50" cy="35" r="7" fill="#E8C560" opacity="0.9"/>
    <circle cx="50" cy="35" r="4" fill="#FAF0D0" opacity="0.8"/>
    <circle cx="100" cy="35" r="7" fill="#E8C560" opacity="0.9"/>
    <circle cx="100" cy="35" r="4" fill="#FAF0D0" opacity="0.8"/>
    <circle cx="150" cy="35" r="9" fill="#E8C560" opacity="0.9"/>
    <circle cx="150" cy="35" r="5.5" fill="#FAF0D0" opacity="0.85"/>
    <circle cx="200" cy="35" r="7" fill="#E8C560" opacity="0.9"/>
    <circle cx="200" cy="35" r="4" fill="#FAF0D0" opacity="0.8"/>
    <circle cx="250" cy="35" r="7" fill="#E8C560" opacity="0.9"/>
    <circle cx="250" cy="35" r="4" fill="#FAF0D0" opacity="0.8"/>
  </g>
  <!-- Meenakari floral between stones -->
  <g fill="#1A6B1A" opacity="0.65">
    <circle cx="75" cy="35" r="3"/><circle cx="125" cy="35" r="3"/>
    <circle cx="175" cy="35" r="3"/><circle cx="225" cy="35" r="3"/>
  </g>
  <!-- Top/bottom rim detail -->
  <rect x="5" y="15" width="290" height="7" rx="3" fill="#E8C560" opacity="0.3"/>
  <rect x="5" y="48" width="290" height="7" rx="3" fill="#B8932A" opacity="0.3"/>
</svg>