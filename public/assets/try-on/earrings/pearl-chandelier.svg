<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 180" width="70" height="180">
  <defs>
    <linearGradient id="gc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C560"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>
  <!-- Hook -->
  <path d="M35 2 C38 2, 42 6, 42 14 C42 20, 38 23, 35 23 C32 23, 28 20, 28 14 C28 6, 32 2, 35 2Z" fill="url(#gc)" opacity="0.9"/>
