  <line x1="20" y1="55" x2="50" y2="55" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <!-- Mid bar -->
  <rect x="14" y="80" width="42" height="5" rx="2.5" fill="url(#gc)" opacity="0.8"/>
  <!-- Pearl drops - 5 strands -->
  <line x1="16" y1="85" x2="16" y2="115" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <line x1="23" y1="85" x2="23" y2="125" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <line x1="35" y1="85" x2="35" y2="135" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <line x1="47" y1="85" x2="47" y2="125" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <line x1="54" y1="85" x2="54" y2="115" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <!-- Pearls -->
  <circle cx="16" cy="118" r="5" fill="#FAF7F0" opacity="0.95"/>
  <circle cx="23" cy="128" r="5.5" fill="#FAF7F0" opacity="0.95"/>
  <circle cx="35" cy="140" r="6" fill="#FAF7F0" opacity="0.95"/>
  <circle cx="47" cy="128" r="5.5" fill="#FAF7F0" opacity="0.95"/>
  <circle cx="54" cy="118" r="5" fill="#FAF7F0" opacity="0.95"/>
  <!-- Pearl shine -->
  <circle cx="13" cy="115" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="32" cy="137" r="2" fill="white" opacity="0.6"/>
