  <line x1="20" y1="36" x2="20" y2="80" stroke="#C9A84C" stroke-width="1.2" opacity="0.7"/>
  <line x1="35" y1="36" x2="35" y2="80" stroke="#C9A84C" stroke-width="1.2" opacity="0.7"/>
